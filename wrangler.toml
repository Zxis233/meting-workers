name = "meting-workers"
main = "src/index.js"
compatibility_date = "2026-04-08"

[vars]
DEBUG_ALLOW_ALL_REFERERS = "false"
AUTH_ENABLED = "true"
DEFAULT_SERVER = "netease"
DEFAULT_BR = "320"
CACHE_MAX_AGE = "300"
PICSIZE = "300"
LRCTYPE = "0"
NETEASE_COOKIE_REFRESH_ENABLED = "true"

[triggers]
crons = ["0 */6 * * *"]

# Public repo note:
# Do not commit KV namespace IDs here. Generate a private deploy config with:
# METING_KV_NAMESPACE_ID=<id> node scripts/generate-wrangler-config.mjs
# wrangler deploy --config .wrangler/wrangler.generated.toml

[secrets]
required = ["SECRET_DOMAIN", "AUTH_SECRET"]
