name = "meting-workers"
main = "src/index.js"
compatibility_date = "2026-04-08"

[vars]
DEBUG_ALLOW_ALL_REFERERS = "false"
AUTH_ENABLED = "true"
DEFAULT_SERVER = "netease"
DEFAULT_BR = "320"
CACHE_MAX_AGE = "300"
PICSIZE = "300"
LRCTYPE = "0"
NETEASE_COOKIE_REFRESH_ENABLED = "true"

[triggers]
crons = ["0 */12 * * *"]

# Create KV namespaces, then uncomment this block and fill real IDs:
# wrangler kv namespace create METING_COOKIE_KV
# wrangler kv namespace create METING_COOKIE_KV --preview
#
# [[kv_namespaces]]
# binding = "METING_COOKIE_KV"
# id = "replace-with-production-kv-id"
# preview_id = "replace-with-preview-kv-id"

[secrets]
required = ["SECRET_DOMAIN", "AUTH_SECRET"]
